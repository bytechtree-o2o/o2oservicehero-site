<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" type="text/css" href="/d5_art/css/reset.css">
    <link rel="stylesheet" type="text/css" href="/d5_art/css/swiper.min.css">
    <link rel="stylesheet" type="text/css" href="/d5_art/css/style.css">
    <title>LG전자 플래그쉽</title>

</head>
<body>

<div class="container">

    <section class="page">

        <header>
            <div class="logo"></div>
        </header>

        <div class="wrap">

            <article class="contents-header">
                <div class="brand-img"></div>

                <div class="info-view">
                    <div class="main-box">이벤트 참여 완료!</div>
                </div>


            </article>

            <article class="event-complete">

                <div class="complete-tit-box">AI 명화 아트 에디션 엽서 6종</div>

                <div class="complete-view-box">

                    <div class="swiper-group-box">

                        <div class="prev-btn"></div>
                        <div class="next-btn"></div>

                        <div class="swiper swiper-complete">
                            <ul class="swiper-wrapper">
                                <li class="swiper-slide"><div class="img-box"><img src="/d5_art/img/img_post1.png" alt="이미지"/></div></li>
                                <li class="swiper-slide"><div class="img-box"><img src="/d5_art/img/img_post2.png" alt="이미지"/></div></li>
                                <li class="swiper-slide"><div class="img-box"><img src="/d5_art/img/img_post3.png" alt="이미지"/></div></li>
                                <li class="swiper-slide"><div class="img-box"><img src="/d5_art/img/img_post4.png" alt="이미지"/></div></li>
                                <li class="swiper-slide"><div class="img-box"><img src="/d5_art/img/img_post5.png" alt="이미지"/></div></li>
                                <li class="swiper-slide"><div class="img-box"><img src="/d5_art/img/img_post6.png" alt="이미지"/></div></li>
                            </ul>
                        </div>
                    </div>
                </div>

                <div class="complete-msg-box">
                    축하합니다!<br/>
                    참여가 완료되었습니다.<br/><br/>
                    SNS 업로드 게시물과 해당 화면을<br/>
                    컨시어지 담당 매니저에게 보여주시면<br/>
                    AI명화 아트 에디션 엽서를 드립니다.
                </div>

            </article>



        </div>

        <footer>
            <div class="btn-box">
                <button type="button" class="button">직원확인</button>
            </div>
        </footer>

    </section>

</div>

</body>
<script src="/d5_art/js/swiperjs.js"></script>
<script>

    const completeSwiper = new Swiper('.swiper-complete', {
        loop: true,
        effect:'fade',
        autoplay: {
            delay: 2000,
            disableOnInteraction: false,
        },
        navigation : {
            prevEl : '.prev-btn',
            nextEl : '.next-btn',
        },
    })

</script>
</html>
